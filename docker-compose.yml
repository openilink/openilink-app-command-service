services:
  command-service-app:
    build: .
    container_name: openilink-app-command-service
    restart: unless-stopped
    environment:
      PORT: "8081"
      HUB_URL: "https://hub.openilink.com"
      BASE_URL: "http://openilink-app-command-service:8081"
      DATABASE_URL: "postgres://openilink:${PG_PASS}@openilink-postgres:5432/openilink?sslmode=disable"
      COMMAND_API_BASE_URL: "https://bhwa233-api.vercel.app/api"
      COMMAND_API_TIMEOUT_MS: "2500"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.command-service-app.rule=Host(`command-service-app.openilink.com`)"
      - traefik.http.routers.command-service-app.entrypoints=websecure
      - traefik.http.routers.command-service-app.tls.certresolver=letsencrypt
      - traefik.http.services.command-service-app.loadbalancer.server.port=8081
    networks:
      - traefik_default

networks:
  traefik_default:
    external: true
