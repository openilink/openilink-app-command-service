services:
  command-service-app:
    build: .
    container_name: openilink-app-command-service
    restart: unless-stopped
    environment:
      PORT: "${PORT:-8081}"
      HUB_URL: "${HUB_URL}"
      BASE_URL: "${BASE_URL}"
      DB_PATH: "/data/command-service.db"
      APP_ID: "${APP_ID:-}"
      COMMAND_API_BASE_URL: "${COMMAND_API_BASE_URL}"
      COMMAND_API_TIMEOUT_MS: "${COMMAND_API_TIMEOUT_MS:-120000}"
    volumes:
      - command-service-data:/data

volumes:
  command-service-data:
